# Production docker-compose for claude-tmux-discord
#
# 1. Copy .env.example to .env and fill in your values:
#      cp .env.example .env
#
# 2. Required .env settings:
#      DISCORD_TOKEN=your-bot-token
#      DATABASE_URL=file:/data/state.db
#      WORKSPACE_ROOT=/workspace
#
# 3. Optional .env settings:
#      REGISTER_GUILD_ID=your-guild-id    # instant slash command registration
#      BOT_OWNER_IDS=id1,id2              # extra users who can run /acl
#      DEFAULT_CHANNEL_ID=channel-id      # default channel for discord-send
#      CLAUDE_CMD=claude                  # claude CLI command
#      LOG_LEVEL=info                     # trace|debug|info|warn|error|fatal
#
# 4. Run:
#      docker compose up -d
#
# Volumes:
#   ./workspace  — per-channel Claude workspaces (persist across restarts)
#   ./data       — SQLite database (Prisma migrations auto-applied on boot)
#   ~/.claude    — host Claude Code auth/config (read-only)

services:
  bot:
    image: ghcr.io/aomkoyo/claude-tmux-discord:latest
    build: .
    container_name: claude-tmux-discord
    env_file: .env
    volumes:
      - ./workspace:/workspace
      - ./data:/data
      - ${HOME}/.claude:/home/node/.claude:ro
    restart: always
    init: true
    stop_grace_period: 15s
