# Production docker-compose for claude-tmux-discord
#
# Setup:
#   1. cp .env.example .env && edit .env (set DISCORD_TOKEN)
#   2. docker compose up -d
#
# Claude Code login:
#   First run requires authentication. Either:
#   a) Mount host ~/.claude (has existing login):
#        Already configured below — just run docker compose up
#   b) Login inside container:
#        docker compose exec bot claude login
#        Session persists in ./claude-config/ volume
#
# Required .env:
#   DISCORD_TOKEN=your-bot-token
#
# Optional .env:
#   REGISTER_GUILD_ID=your-guild-id
#   BOT_OWNER_IDS=id1,id2
#   DEFAULT_CHANNEL_ID=channel-id
#   LOG_LEVEL=info

services:
  bot:
    image: ghcr.io/aomkoyo/claude-tmux-discord:latest
    build: .
    container_name: claude-tmux-discord
    env_file: .env
    volumes:
      # Per-channel workspaces
      - ./workspace:/workspace
      # SQLite database (auto-migrated on boot)
      - ./data:/data
      # Claude Code auth + session data (read-write for token refresh)
      # Option A: share host login (recommended if host has claude logged in)
      - ${HOME}/.claude:/home/node/.claude
      # Option B: isolated container login (uncomment below, comment above)
      # - ./claude-config:/home/node/.claude
    restart: always
    init: true
    stop_grace_period: 15s
